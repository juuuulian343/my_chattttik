<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мой Чат - Общайся с друзьями</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #e5ded8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: white;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header {
            background: #075e54;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 20px;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #e5ded8;
        }
        
        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }
        
        .message.sent {
            align-items: flex-end;
        }
        
        .message.received {
            align-items: flex-start;
        }
        
        .bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .sent .bubble {
            background: #dcf8c5;
            color: #000;
            border-bottom-right-radius: 4px;
        }
        
        .received .bubble {
            background: white;
            color: #000;
            border-bottom-left-radius: 4px;
        }
        
        .sender-name {
            font-size: 11px;
            color: #666;
            margin-bottom: 2px;
            margin-left: 8px;
        }
        
        .time {
            font-size: 10px;
            color: #999;
            margin-top: 3px;
            margin-left: 10px;
        }
        
        .input-area {
            background: white;
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        .input-area input:focus {
            border-color: #075e54;
        }
        
        .input-area button {
            background: #075e54;
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 320px;
            text-align: center;
        }
        
        .login-box h2 {
            color: #075e54;
            margin-bottom: 20px;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #075e54;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .status {
            font-size: 12px;
            text-align: center;
            padding: 8px;
            background: #f0f0f0;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .connection-status {
            font-size: 10px;
            margin-left: 10px;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .online {
            background: #25d366;
        }
        
        .offline {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="header">
            <h1>💬  Мой Чат</h1>
        </div>
        <div class="status" id="status">Вы в чате</div>
        <div class="messages" id="messagesArea">
            <div class="loading">Загрузка сообщений...</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение...">
            <button id="sendBtn">📤</button>
        </div>
    </div>
    
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>💬  Вход в чат</h2>
            <input type="text" id="usernameInput" placeholder="Ваше имя" maxlength="20">
            <button id="loginBtn">Начать общение</button>
            <p style="margin-top: 12px; font-size: 11px; color: #999;">
                🔥  Все сообщения видны всем друзьям!<br>
                Отправьте ссылку и общайтесь вместе!
            </p>
        </div>
    </div>

    <script>
        // ========== СЕРВЕР ДЛЯ ХРАНЕНИЯ СООБЩЕНИЙ ==========
        // Это бесплатный сервер, который хранит все сообщения
        const API_URL = "https://simple-chat-api.up.railway.app";
        
        let currentUser = "";
        let messages = [];
        let updateInterval = null;
        
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const loginScreen = document.getElementById('loginScreen');
        const chatContainer = document.getElementById('chatContainer');
        const usernameInput = document.getElementById('usernameInput');
        const loginBtn = document.getElementById('loginBtn');
        const statusDiv = document.getElementById('status');
        
        // Загрузка сообщений с сервера
        async function loadMessages() {
            try {
                const response = await fetch(`${API_URL}/messages`);
                const data = await response.json();
                
                if (data.success && data.messages) {
                    messages = data.messages;
                    renderMessages();
                }
                return true;
            } catch (error) {
                console.error("Ошибка загрузки:", error);
                return false;
            }
        }
        
        // Отправка сообщения на сервер
        async function sendMessageToServer(text, sender) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            try {
                const response = await fetch(`${API_URL}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: text,

                        sender: sender,
                        time: timeStr,
                        timestamp: now.getTime()
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    // После отправки загружаем свежие сообщения
                    await loadMessages();
                    return true;
                }
            } catch (error) {
                console.error("Ошибка отправки:", error);
                return false;
            }
        }
        
        function renderMessages() {
            if (!messagesArea) return;
            messagesArea.innerHTML = '';
            
            if (messages.length === 0) {
                messagesArea.innerHTML = '<div class="loading">✨ Напишите первое сообщение!</div>';
                return;
            }
            
            messages.forEach(msg => {
                if (!msg.text) return;
                const isMe = msg.sender === currentUser;
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isMe ? 'sent' : 'received'}`;
                
                let nameHtml = '';
                if (!isMe && msg.sender !== '📢  Система') {
                    nameHtml = `<div class="sender-name">${escapeHtml(msg.sender)}</div>`;
                }
                
                if (msg.sender === '📢  Система') {
                    messageDiv.style.textAlign = 'center';
                    messageDiv.style.margin = '8px 0';
                    messageDiv.innerHTML = `<div style="background: #e0e0e0; padding: 5px 12px; border-radius: 15px; display: inline-block; font-size: 11px;">${escapeHtml(msg.text)}</div>`;
                } else {
                    messageDiv.innerHTML = `
                        ${nameHtml}
                        <div class="bubble">${escapeHtml(msg.text)}</div>
                        <div class="time">${msg.time || ''}</div>
                    `;
                }
                
                messagesArea.appendChild(messageDiv);
            });
            
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;
            
            // Показываем "отправка..."
            sendBtn.disabled = true;
            sendBtn.textContent = "⏳";
            
            const success = await sendMessageToServer(text, currentUser);
            
            sendBtn.disabled = false;
            sendBtn.textContent = "📤";
            
            if (success) {
                messageInput.value = '';
                messageInput.focus();
            } else {
                alert("Ошибка отправки. Проверьте интернет.");
            }
        }
        
        async function login() {
            const name = usernameInput.value.trim();
            if (!name) {
                alert('Пожалуйста, введите ваше имя');
                return;
            }
            
            currentUser = name;
            localStorage.setItem('chatUser', currentUser);
            
            loginScreen.style.display = 'none';
            chatContainer.style.display = 'flex';
            statusDiv.innerHTML = `👤  Вы вошли как ${currentUser} | 🌐  Общий чат`;
            
            messageInput.focus();
            
            // Загружаем сообщения
            await loadMessages();
            
            // Обновляем каждые 2 секунды
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(loadMessages, 2000);
        }
        
        const savedUser = localStorage.getItem('chatUser');
        if (savedUser) {
            usernameInput.value = savedUser;
        }
        
        loginBtn.addEventListener('click', login);
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
